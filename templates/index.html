<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bili_Notes — Bilibili 音频转文字</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="warning-banner">不要一次下载太多，否则会被 B 站封 IP</div>

  <nav class="nav">
    <a href="/config">⚙ 配置</a>
  </nav>

  <main class="layout-single">

    <section class="panel">
      <div class="field">
        <label for="bvids">BV ID 列表（每行一个）</label>
        <textarea id="bvids" rows="6" placeholder="BV1abcXYZ123&#10;BV1abcXYZ456"></textarea>
      </div>

      <button class="btn btn-primary btn-wide" id="btn-process">开始处理</button>

      <div class="log-header">
        <span>处理日志</span>
        <button class="btn btn-secondary btn-xs" id="btn-clear-log">清空</button>
      </div>
      <div id="status-log" class="status-log" aria-live="polite" aria-label="处理日志"></div>
    </section>

    <section class="panel">
      <h2>操作</h2>

      <div class="btn-group">
        <button class="btn" id="btn-dl-transcript">下载合并文字稿</button>
        <button class="btn" id="btn-dl-summary">下载合并总结</button>
        <button class="btn" id="btn-view-transcript">查看文字稿</button>
        <button class="btn" id="btn-view-summary">查看总结</button>
        <button class="btn btn-secondary" id="btn-show-bvids">查看已有 BV 列表</button>
      </div>

      <div class="btn-group btn-group-danger">
        <button class="btn btn-danger" id="btn-clear-temp">清理临时文件</button>
        <button class="btn btn-danger" id="btn-clear-all">清除所有文件</button>
      </div>

      <div id="bvid-list" class="bvid-list" style="display:none;"></div>
    </section>

  </main>

  <footer class="page-footer">Bili_Notes {{ version }}</footer>

  <script>
  // ─────────────────────────────────────────────────────────────────────────
  // Helpers
  // ─────────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function appendLog(type, text) {
    const log = $('status-log');
    const line = document.createElement('div');
    line.className = 'log-line log-' + type;
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function updateProgress(done, total) {
    const log = $('status-log');
    let el = $('log-progress');
    if (!el) {
      el = document.createElement('div');
      el.id = 'log-progress';
      el.className = 'log-line log-progress-bar';
      log.appendChild(el);
    }
    const pct = total ? Math.round(done / total * 100) : null;
    const label = total ? `${done} / ${total} (${pct}%)` : `${done} 段`;
    const fill = pct !== null ? pct : 0;
    el.innerHTML =
      `<span class="prog-label">▶ 转录</span>` +
      `<div class="prog-track"><div class="prog-fill" style="width:${fill}%"></div></div>` +
      `<span class="prog-text">${label}</span>`;
    log.scrollTop = log.scrollHeight;
  }

  function clearProgress() {
    const el = $('log-progress');
    if (el) el.remove();
  }

  function confirmAction(message, url, successMsg) {
    if (!confirm(message)) return;
    fetch(url, { method: 'POST' })
      .then(r => r.json())
      .then(d => appendLog('success', successMsg + '（已清理 ' + (d.cleared || 0) + ' 项）'))
      .catch(e => appendLog('error', '操作失败：' + e));
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Start processing — fetch config first, then POST to /api/process
  // ─────────────────────────────────────────────────────────────────────────
  let eventSource = null;

  function startSSE() {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
    eventSource = new EventSource('/api/status');
    eventSource.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'progress') {
          updateProgress(msg.done, msg.total);
        } else {
          clearProgress();
          appendLog(msg.type || 'info', msg.text || '');
          if ((msg.type === 'success' || msg.type === 'error') &&
              (msg.text === '所有任务完成' || msg.text.startsWith('所有任务'))) {
            setTimeout(() => { if (eventSource) { eventSource.close(); eventSource = null; } }, 2000);
          }
        }
      } catch (_) {}
    };
    eventSource.onerror = () => {
      if (eventSource) { eventSource.close(); eventSource = null; }
    };
  }

  $('btn-process').addEventListener('click', () => {
    const bvids = $('bvids').value.split('\n').map(s => s.trim()).filter(Boolean);
    if (!bvids.length) {
      appendLog('error', '请先填写 BV ID 列表');
      return;
    }

    $('btn-process').disabled = true;
    appendLog('info', '正在读取配置…');

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        const body = {
          bvids,
          api_key:        cfg.api_key        || '',
          model:          cfg.model          || '',
          base_url:       cfg.base_url       || '',
          summary_prompt: cfg.summary_prompt || '',
          cookie:         cfg.cookie         || '',
        };
        appendLog('info', '正在提交任务…');
        return fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      })
      .then(r => r.json())
      .then(d => {
        if (d.ok) {
          appendLog('info', `已接受 ${d.count} 个 BV ID，开始处理…`);
          startSSE();
        } else {
          appendLog('error', d.error || '提交失败');
        }
      })
      .catch(e => appendLog('error', '网络错误：' + e))
      .finally(() => { $('btn-process').disabled = false; });
  });

  // ─────────────────────────────────────────────────────────────────────────
  // Download / View buttons
  // ─────────────────────────────────────────────────────────────────────────
  $('btn-dl-transcript').addEventListener('click', () => {
    window.location.href = '/api/download/transcript';
  });
  $('btn-dl-summary').addEventListener('click', () => {
    window.location.href = '/api/download/summary';
  });
  $('btn-view-transcript').addEventListener('click', () => {
    window.open('/api/view/transcript', '_blank');
  });
  $('btn-view-summary').addEventListener('click', () => {
    window.open('/api/view/summary', '_blank');
  });

  // ─────────────────────────────────────────────────────────────────────────
  // Clear buttons
  // ─────────────────────────────────────────────────────────────────────────
  $('btn-clear-temp').addEventListener('click', () => {
    confirmAction('确定要清理所有临时文件吗？', '/api/clear/temp', '临时文件已清理');
  });
  $('btn-clear-all').addEventListener('click', () => {
    confirmAction(
      '确定要清除 userdata 下所有文件吗？此操作不可撤销，config.json 将被保留。',
      '/api/clear/all',
      '用户数据已清除'
    );
  });
  $('btn-clear-log').addEventListener('click', () => {
    $('status-log').innerHTML = '';
    clearProgress();
  });

  $('btn-show-bvids').addEventListener('click', () => {
    const box = $('bvid-list');
    if (box.style.display !== 'none') { box.style.display = 'none'; return; }
    fetch('/api/bvids')
      .then(r => r.json())
      .then(d => {
        if (!d.bvids.length) {
          box.textContent = '（暂无已处理的 BV ID）';
        } else {
          box.textContent = d.bvids.join('\n');
        }
        box.style.display = 'block';
      })
      .catch(e => appendLog('error', '获取 BV 列表失败：' + e));
  });
  </script>

</body>
</html>
