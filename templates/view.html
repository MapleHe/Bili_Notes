<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Bili_Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-back {
      color: #3f6ad8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .toolbar-back:hover { text-decoration: underline; }

    .toolbar-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .font-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .font-btn {
      border: 1px solid #ccc;
      background: #f0f0f0;
      border-radius: 5px;
      cursor: pointer;
      padding: 6px 13px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .font-btn:hover   { background: #e0e0e0; }
    .font-btn:active  { background: #d0d0d0; }
    .font-btn:disabled { opacity: .4; cursor: default; }

    .font-label {
      font-size: 0.78rem;
      color: #666;
      min-width: 34px;
      text-align: center;
    }

    /* ── Content card ────────────────────────────────────────── */
    .content-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    #content {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 28px 32px;
      font-size: 16px;   /* overridden by JS */
      line-height: 1.85;
      font-family: inherit;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* ── Markdown element styles (scoped to #content) ────────── */
    #content h1,
    #content h2,
    #content h3,
    #content h4 {
      font-weight: 700;
      line-height: 1.35;
      color: #1a1a1a;
      margin: 1.4em 0 0.5em;
    }
    #content h1 {
      font-size: 1.55em;
      padding-bottom: 0.3em;
      border-bottom: 2px solid #e8eaf0;
    }
    #content h2 {
      font-size: 1.28em;
      padding-bottom: 0.25em;
      border-bottom: 1px solid #eee;
    }
    #content h3 { font-size: 1.1em; }
    #content h4 { font-size: 1em; color: #444; }

    /* First heading at the very top needs no top margin */
    #content > h1:first-child,
    #content > h2:first-child {
      margin-top: 0;
    }

    #content p { margin: 0.75em 0; }

    #content ul,
    #content ol {
      margin: 0.6em 0 0.6em 1.6em;
    }
    #content li { margin: 0.3em 0; }
    #content li > p { margin: 0.2em 0; }

    #content hr {
      border: none;
      border-top: 2px solid #e8eaf0;
      margin: 1.6em 0;
    }

    #content blockquote {
      border-left: 4px solid #3f6ad8;
      margin: 0.9em 0;
      padding: 0.5em 1em;
      background: #f0f4ff;
      border-radius: 0 6px 6px 0;
      color: #444;
    }
    #content blockquote p { margin: 0; }

    /* Inline code */
    #content code {
      background: #f0f4ff;
      color: #c7254e;
      padding: 0.1em 0.38em;
      border-radius: 3px;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.88em;
    }

    /* Fenced code blocks */
    #content pre {
      background: #1a1a2e;
      color: #c9d1d9;
      border-radius: 8px;
      padding: 14px 18px;
      margin: 0.9em 0;
      overflow-x: auto;
      line-height: 1.55;
    }
    #content pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 0.875em;
    }

    /* Tables */
    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.9em 0;
      font-size: 0.95em;
    }
    #content th,
    #content td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    #content th {
      background: #f0f4ff;
      font-weight: 700;
    }
    #content tr:nth-child(even) td { background: #fafafa; }

    /* Bold / italic */
    #content strong { font-weight: 700; }
    #content em     { font-style: italic; }

    /* ── Fallback: plain-text mode when marked.js is unavailable  */
    #content.raw {
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      .content-wrap { padding: 12px 8px 60px; }
      #content { padding: 18px 16px; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="toolbar-back" href="/">← 返回</a>
    <span class="toolbar-title">{{ title }}</span>
    <div class="font-controls">
      <button class="font-btn" id="btn-smaller" aria-label="缩小字体">A−</button>
      <span class="font-label" id="font-label"></span>
      <button class="font-btn" id="btn-larger"  aria-label="放大字体">A+</button>
    </div>
  </div>

  <div class="content-wrap">
    <div id="content"></div>
  </div>

  <!-- Raw content passed safely from Flask as a JSON string -->
  <script>const _raw = {{ content | tojson }};</script>

  <!-- marked.js for client-side markdown rendering (no Python dependency).
       Falls back to plain pre-wrap display if CDN is unreachable. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <script>
    const STORAGE_KEY = 'bili-notes-viewer-font-size';
    const MIN = 12, MAX = 32, DEFAULT = 16;

    let size = parseInt(localStorage.getItem(STORAGE_KEY), 10);
    if (!size || size < MIN || size > MAX) size = DEFAULT;

    const contentEl = document.getElementById('content');

    // Render markdown if marked loaded, otherwise show plain text
    if (typeof marked !== 'undefined') {
      marked.use({ gfm: true, breaks: true });
      contentEl.innerHTML = marked.parse(_raw);
    } else {
      contentEl.textContent = _raw;
      contentEl.classList.add('raw');
    }

    function apply(n) {
      size = Math.max(MIN, Math.min(MAX, n));
      contentEl.style.fontSize = size + 'px';
      document.getElementById('font-label').textContent = size + 'px';
      localStorage.setItem(STORAGE_KEY, size);
      document.getElementById('btn-smaller').disabled = (size <= MIN);
      document.getElementById('btn-larger').disabled  = (size >= MAX);
    }

    document.getElementById('btn-smaller').addEventListener('click', () => apply(size - 1));
    document.getElementById('btn-larger').addEventListener('click',  () => apply(size + 1));

    apply(size);
  </script>

</body>
</html>
