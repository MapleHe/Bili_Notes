<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Bili_Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      /* Prevent browser auto-scaling on orientation change;
         user controls size explicitly via the A−/A+ buttons. */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      /* Prevent horizontal overflow when zoomed */
      overflow-x: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-back {
      color: #3f6ad8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .toolbar-back:hover { text-decoration: underline; }

    .toolbar-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .font-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .font-btn {
      border: 1px solid #ccc;
      background: #f0f0f0;
      border-radius: 5px;
      cursor: pointer;
      /* Large tap target for mobile */
      padding: 6px 13px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .font-btn:hover  { background: #e0e0e0; }
    .font-btn:active { background: #d0d0d0; }
    .font-btn:disabled { opacity: .4; cursor: default; }

    .font-label {
      font-size: 0.78rem;
      color: #666;
      min-width: 34px;
      text-align: center;
    }

    /* ── Content area ────────────────────────────────────────── */
    .content-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    #content {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 24px 28px;

      /* These three together ensure text wraps correctly at any zoom level.
         white-space: pre-wrap preserves newlines but wraps long lines,
         unlike plain `pre` which causes horizontal scroll when zoomed. */
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;

      /* font-size is controlled by JS; this is the initial fallback */
      font-size: 16px;
      line-height: 1.85;
      font-family: inherit;
      max-width: 100%;
    }

    @media (max-width: 600px) {
      .content-wrap { padding: 12px 8px 60px; }
      #content { padding: 16px 14px; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="toolbar-back" href="/">← 返回</a>
    <span class="toolbar-title">{{ title }}</span>
    <div class="font-controls">
      <button class="font-btn" id="btn-smaller" aria-label="缩小字体">A−</button>
      <span class="font-label" id="font-label"></span>
      <button class="font-btn" id="btn-larger"  aria-label="放大字体">A+</button>
    </div>
  </div>

  <div class="content-wrap">
    <div id="content">{{ content }}</div>
  </div>

  <script>
    const STORAGE_KEY = 'bili-notes-viewer-font-size';
    const MIN = 12, MAX = 32;
    // Slightly larger default on narrow / high-DPI screens
    const DEFAULT = window.innerWidth < 600 ? 18 : 16;

    let size = parseInt(localStorage.getItem(STORAGE_KEY), 10);
    if (!size || size < MIN || size > MAX) size = DEFAULT;

    function apply(n) {
      size = Math.max(MIN, Math.min(MAX, n));
      document.getElementById('content').style.fontSize = size + 'px';
      document.getElementById('font-label').textContent = size + 'px';
      localStorage.setItem(STORAGE_KEY, size);
      document.getElementById('btn-smaller').disabled = (size <= MIN);
      document.getElementById('btn-larger').disabled  = (size >= MAX);
    }

    document.getElementById('btn-smaller').addEventListener('click', () => apply(size - 1));
    document.getElementById('btn-larger').addEventListener('click',  () => apply(size + 1));

    apply(size);
  </script>

</body>
</html>
