<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置 — a2doc</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="warning-banner">不要一次下载太多，否则会被 B 站封 IP</div>

  <nav class="nav">
    <a href="/">← 返回主页</a>
  </nav>

  <main class="layout-config">

    <section class="panel">
      <h2>配置</h2>

      <div class="field">
        <label for="provider">LLM 服务商</label>
        <select id="provider">
          {% for key, info in providers.items() %}
          <option value="{{ key }}" data-base-url="{{ info.base_url }}"
            data-default-model="{{ info.default_model }}"
            data-models="{{ info.models | join(',') }}">
            {{ info.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-xxxxxxxxxxxxxxxx">
      </div>

      <div class="field">
        <label for="model">模型</label>
        <select id="model"></select>
        <input type="text" id="model-custom" placeholder="自定义模型名称"
          style="display:none; margin-top:6px;">
      </div>

      <div class="field" id="base-url-field" style="display:none;">
        <label for="base-url">API Base URL</label>
        <input type="text" id="base-url" placeholder="https://api.example.com/v1">
      </div>

      <div class="field">
        <label for="cookie">Bilibili Cookie（登录后可下载高清 / 会员内容）</label>
        <textarea id="cookie" rows="4"
          placeholder="SESSDATA=abc123%2C1234567890%2Cabc123; bili_jct=abcdef1234567890abcdef1234567890; DedeUserID=12345678; DedeUserID__ckMd5=abcdef1234; buvid3=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXXinfoc; buvid4=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXXinfoc; sid=xxxxxxxx"></textarea>
        <p class="field-hint">
          <strong>如何获取：</strong>浏览器登录 bilibili.com →
          打开开发者工具（F12）→ Application → Cookies →
          选择 <code>https://www.bilibili.com</code>，
          按顺序复制以下字段的值并拼接：<br>
          <code>SESSDATA</code>（必须）·
          <code>bili_jct</code>（必须）·
          <code>DedeUserID</code>（必须）·
          <code>DedeUserID__ckMd5</code>（推荐）·
          <code>buvid3</code>（推荐）·
          <code>buvid4</code>（推荐）·
          <code>sid</code>（可选）<br>
          格式：<code>名称=值; 名称=值; ...</code>，各字段以 <code>; </code> 分隔，粘贴整行即可。
        </p>
      </div>

      <div class="field">
        <label for="summary-prompt">摘要提示词</label>
        <textarea id="summary-prompt" rows="4"
          placeholder="请总结这段视频的主要内容，包括关键观点和结论。"></textarea>
      </div>

      <button class="btn btn-primary btn-wide" id="btn-save">保存配置</button>

      <div id="save-msg" class="save-msg" style="display:none;"></div>
    </section>

  </main>

  <script>
  // ─────────────────────────────────────────────────────────────────────────
  // Helpers
  // ─────────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showMsg(ok, text) {
    const el = $('save-msg');
    el.textContent = text;
    el.className = 'save-msg ' + (ok ? 'save-msg-ok' : 'save-msg-err');
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Provider / model selector
  // ─────────────────────────────────────────────────────────────────────────
  function populateModels(providerKey) {
    const sel = $('provider');
    const opt = sel.querySelector('[value="' + providerKey + '"]');
    if (!opt) return;
    const models = opt.dataset.models ? opt.dataset.models.split(',').filter(Boolean) : [];
    const modelSel = $('model');
    const customInput = $('model-custom');
    const baseUrlField = $('base-url-field');

    modelSel.innerHTML = '';
    if (providerKey === 'custom') {
      modelSel.style.display = 'none';
      customInput.style.display = 'block';
      baseUrlField.style.display = 'block';
    } else {
      modelSel.style.display = 'block';
      customInput.style.display = 'none';
      baseUrlField.style.display = 'none';
      models.forEach(m => {
        const o = document.createElement('option');
        o.value = m;
        o.textContent = m;
        modelSel.appendChild(o);
      });
      const defaultModel = opt.dataset.defaultModel;
      if (defaultModel) modelSel.value = defaultModel;
    }
  }

  $('provider').addEventListener('change', e => populateModels(e.target.value));
  populateModels($('provider').value);

  // ─────────────────────────────────────────────────────────────────────────
  // Load config
  // ─────────────────────────────────────────────────────────────────────────
  function loadConfig() {
    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        if (cfg.summary_prompt) $('summary-prompt').value = cfg.summary_prompt;
        if (cfg.api_key)        $('api-key').value = cfg.api_key;
        if (cfg.cookie)         $('cookie').value = cfg.cookie;
        if (cfg.provider) {
          $('provider').value = cfg.provider;
          populateModels(cfg.provider);
        }
        if (cfg.model) {
          if ($('provider').value === 'custom') {
            $('model-custom').value = cfg.model;
          } else {
            $('model').value = cfg.model;
          }
        }
        if (cfg.base_url) $('base-url').value = cfg.base_url;
      })
      .catch(() => {});
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Save config
  // ─────────────────────────────────────────────────────────────────────────
  $('btn-save').addEventListener('click', () => {
    const provider = $('provider').value;
    const model = provider === 'custom'
      ? $('model-custom').value.trim()
      : $('model').value;
    const providerOpt = $('provider').querySelector('[value="' + provider + '"]');
    const baseUrl = provider === 'custom'
      ? $('base-url').value.trim()
      : (providerOpt ? providerOpt.dataset.baseUrl : '');

    const cfg = {
      summary_prompt: $('summary-prompt').value,
      api_key:        $('api-key').value,
      cookie:         $('cookie').value,
      provider,
      model,
      base_url:       baseUrl,
    };

    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg),
    })
      .then(r => r.json())
      .then(() => showMsg(true, '配置已保存'))
      .catch(e => showMsg(false, '保存失败：' + e));
  });

  loadConfig();
  </script>

</body>
</html>
